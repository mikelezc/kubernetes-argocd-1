# Con este archivo le decimos a ArgoCD que tome el repo de Github que hemos creado,
# y lo despliegue en nuestro cluster cada vez que detecte un cambio (auto sync).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iot-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mikelezc/mlezcano-iot-argocd.git'
    targetRevision: main
    path: '.'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
