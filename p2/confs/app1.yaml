# Primero, creamos un archivo HTML falso con "app1"
apiVersion: v1
kind: ConfigMap
metadata:
  name: app1-html
data:
  index.html: |
    <h1>app1</h1>
---
# Segundo, definimos la app (Deployment). Usamos nginx como base.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: nginx-app1
        image: nginx:alpine
        volumeMounts:
        - name: app1-vol
          mountPath: /usr/share/nginx/html # Reemplazamos la web por defecto de nginx
      volumes:
      - name: app1-vol
        configMap:
          name: app1-html
---
# Tercero, el Servicio. (Cómo se llama a esta app internamente)
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: app1
