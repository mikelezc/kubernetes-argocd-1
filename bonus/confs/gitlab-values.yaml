# gitlab-values.yaml
# Configuración "mega-light" de GitLab en Kubernetes.
# Esta configuración es la que será utilizada por Helm para desplegar GitLab en el cluster de Kubernetes.
global:
  edition: ce               # Community Edition
  hosts:
    domain: localhost
    https: false
installCertmanager: false
certmanager-issuer:
  email: admin@gitlab.local 
nginx-ingress:
  enabled: false
prometheus:
  install: false
gitlab-runner:
  install: false
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
  minio:
    image:
      repository: minio/minio
      tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
registry:
  enabled: false
