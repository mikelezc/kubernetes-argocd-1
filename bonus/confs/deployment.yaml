apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlezcano-playground
  namespace: dev
  labels:
    app: playground
    owner: mlezcano
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground
  template:
    metadata:
      labels:
        app: playground
        owner: mlezcano
    spec:
      containers:
      - name: mlezcano-playground
        image: mikelezc/playground:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: VERSION
          value: "v1" # esta es la variable que cambiaremos para la demostración de la actualización de la aplicación (v1 ó v2)
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: mlezcano-playground
  namespace: dev
  labels:
    app: playground
    owner: mlezcano
spec:
  type: NodePort
  ports:
  - port: 8888
    targetPort: 8888
    nodePort: 30080
  selector:
    app: playground
